<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader | MP4 & MP3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗿</text></svg>">
</head>
<body>
    <!-- Animated BG -->
    <div class="bg-gradient"></div>
    <div class="bg-particles"></div>

    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🗿</span>
                <h1>YT<span class="accent">Down</span></h1>
            </div>
            <p class="subtitle">Download video & audio YouTube tanpa iklan</p>
        </header>

        <!-- SEARCH CARD -->
        <div class="search-card">
            <form id="downloadForm" class="search-box">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="urlInput" 
                        placeholder="Tempel link YouTube di sini..."
                        autocomplete="off"
                        required
                    >
                    <button type="button" id="clearBtn" class="clear-btn hidden">✕</button>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">
                    <span id="btnText">🔍 Cari</span>
                    <span id="btnLoading" class="hidden">
                        <span class="spinner-small"></span>
                    </span>
                </button>
            </form>
            <p class="hint">Support: youtube.com & youtu.be</p>
        </div>

        <!-- ERROR -->
        <div id="errorMsg" class="error-card hidden"></div>

        <!-- LOADING -->
        <div id="loadingState" class="loading-card hidden">
            <div class="spinner"></div>
            <p>Mengambil data video...</p>
            <span class="loading-sub">Ini mungkin butuh beberapa detik</span>
        </div>

        <!-- RESULT -->
        <div id="resultContainer" class="result-card hidden"></div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Powered by <span>fikri.z</span>| • ©2026 Sungai mandan</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

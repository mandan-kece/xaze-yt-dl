<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaze Downloader YT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>XZ</h1>
            <p>Download video & audio dari YouTube</p>
        </div>

        <form id="downloadForm" class="search-box">
            <input 
                type="text" 
                id="urlInput" 
                placeholder="Tempel link YouTube di sini..."
                autocomplete="off"
                required
            >
            <button type="submit" id="submitBtn">
                <span id="btnText">Cari</span>
                <span id="btnLoading" class="hidden">⏳</span>
            </button>
        </form>

        <div id="errorMsg" class="error hidden"></div>

        <div id="loadingState" class="loading hidden">
            <div class="spinner"></div>
            <p>Mengambil data video...</p>
        </div>

        <div id="resultContainer" class="result hidden">
            <!-- akan diisi dari JS -->
        </div>
    </div>

    <footer>
        <p>ᴘᴏᴡᴇʀᴇᴅ ʙʏ<span> ғɪᴋʀɪ.ᴢ</span>| ©2026 sᴜɴɢᴀɪ ᴍᴀɴᴅᴀɴ</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
